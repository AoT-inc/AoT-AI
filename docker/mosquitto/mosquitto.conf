# Local-dev Mosquitto config.
# NOTE: anonymous access is enabled for convenience inside the docker network.
# Do NOT use this config when exposing the broker to untrusted networks.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# MQTT over TCP
listener 1883 0.0.0.0
allow_anonymous true

# MQTT over WebSocket (optional — used by browser dashboards)
listener 9001 0.0.0.0
protocol websockets
