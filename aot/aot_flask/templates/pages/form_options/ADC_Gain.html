{% if 'adc_gain' in dict_options['options_enabled'] %}

<div class="aot-modal-option-row">
  {{form.adc_gain.label(class_='aot-modal-option-label mb-0')}}
  <div class="aot-modal-option-control">
    <select class="form-control aot-modern-select form-tooltip form-dropdown" data-placement="top" id="adc_gain" name="adc_gain" title="{{dict_translation['adc_gain']['phrase']}}">
      <option value=""></option>
      {% for each_value, each_name in dict_options['adc_gain'] %}
        <option value="{{each_value}}"{% if each_device.adc_gain == each_value %} selected{% endif %}>{{each_name}}</option>
      {% endfor %}
    </select>
  </div>
</div>

{% endif %}
