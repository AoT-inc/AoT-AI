<!-- Learning Progress Dashboard Component -->
<!-- Jinja2 include component for AI facility learning progress visualization -->
<div id="ai-learning-dashboard" data-facility-id="{{ facility_id }}" style="display:none;">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">{{ _('Facility Learning Status') }}</h5>
    </div>
    <div class="card-body">
      <!-- Learning phase status badge -->
      <div id="ld-phase-badge"></div>

      <!-- Category progress bars -->
      <div id="ld-progress-bars" class="mt-3"></div>

      <!-- Feedback summary stats -->
      <div id="ld-feedback-summary" class="mt-3"></div>

      <!-- Next recommended feedback -->
      <div id="ld-next-feedback" class="mt-2"></div>

      <!-- Stalled alert (hidden by default) -->
      <div id="ld-stalled-alert" class="mt-2" style="display:none;"></div>
    </div>
  </div>
</div>
