<!-- Temporary debug script to check input forms -->
<script>
console.log("=== DEBUG: Checking Input Forms ===");

// Find all input forms
const forms = document.querySelectorAll('form[id^="form_input_"]');
console.log(`Found ${forms.length} input forms`);

forms.forEach((form, index) => {
    const formId = form.id;
    const inputIdField = form.querySelector('input[name="input_id"]');
    const csrfField = form.querySelector('input[name="csrf_token"]');
    
    console.log(`\nForm ${index + 1}: ${formId}`);
    console.log(`  - CSRF token: ${csrfField ? 'EXISTS' : 'MISSING'}`);
    console.log(`  - input_id field: ${inputIdField ? 'EXISTS' : 'MISSING'}`);
    
    if (inputIdField) {
        console.log(`  - input_id value: ${inputIdField.value || 'EMPTY'}`);
    } else {
        console.error(`  ❌ input_id field is MISSING in ${formId}!`);
    }
});

console.log("=== END DEBUG ===");
</script>
