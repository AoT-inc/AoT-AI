  \ offset\nc. Remove the \"rescue block\" that silently reschedules to now+10s.\n\
  \   Instead: if dt_utc is in the past, return an error message to the LLM:\n   \
  \  \"Requested schedule time {original_input} is in the past. Please provide a future\
  \ time.\"\nd. Pass dt_utc to propose_job() as the run_at value.\n\n### 4. Audit\
  \ ai_scheduler_service.py datetime usage\nSearch ai_scheduler_service.py for:\n\
