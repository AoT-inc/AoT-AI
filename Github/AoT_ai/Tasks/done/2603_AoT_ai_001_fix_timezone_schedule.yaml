  2. There is no single authoritative function for \"get user timezone\" —\n   each\
  \ module handles TZ conversion differently.\n3. APScheduler triggers may be stored\
  \ with incorrect TZ offset.\n\n## Design decisions (confirmed by product owner)\n\
  - All datetime values stored in DB and passed to APScheduler: UTC.\n- UI display\
  \ layer only: convert UTC → user timezone using settings/general value.\n- Source\
  \ of truth for user timezone: settings/general page (a GeneralSettings\n  or equivalent\
  \ model with a timezone field).\n- Docker system timezone: always treated as UTC;\
  \ never rely on os.timezone.\n\n---\n\n## Steps\n\n### 1. Locate the timezone setting\n\
  1. Search for the GeneralSettings (or equivalent) model that stores the\n   user\
  \ timezone preference. Note the field name and model location.\n2. Read the service\
  \ or utility that reads this setting (if it exists).\n3. Note how the current timezone\
  \ value is formatted (e.g., \"Asia/Seoul\",\n   \"UTC+9\", \"+09:00\").\n\n### 2.\
  \ Create a timezone utility module\nCreate `aot/utils/tz_utils.py` with:\n\n```python\n\
  # aot/utils/tz_utils.py\n\"\"\"\nTimezone utility for schedule services.\nRule:\
  \ all internal datetimes are UTC-aware.\n      UI display converts via get_user_tz().\n\
  \"\"\"\nfrom datetime import datetime, timezone\nimport zoneinfo  # Python 3.9+;\
  \ fall back to pytz if not available\n\ndef get_user_tz() -> zoneinfo.ZoneInfo:\n\
  \    \"\"\"Return user timezone from GeneralSettings. Falls back to UTC.\"\"\"\n\
  \    # TODO: import and read GeneralSettings here\n    # tz_str = GeneralSettings.query.first().timezone\
  \ or \"UTC\"\n    # return zoneinfo.ZoneInfo(tz_str)\n    raise NotImplementedError\
  \  # replace with actual implementation\n\ndef to_utc(dt: datetime) -> datetime:\n\
  \    \"\"\"Convert any aware datetime to UTC. Raises if dt is naive.\"\"\"\n   \
  \ if dt.tzinfo is None:\n        raise ValueError(f\"Naive datetime passed to to_utc:\
  \ {dt!r}\")\n    return dt.astimezone(timezone.utc)\n\ndef to_user_tz(dt: datetime)\
  \ -> datetime:\n    \"\"\"Convert UTC datetime to user local timezone for display.\"\
  \"\"\n    return dt.astimezone(get_user_tz())\n\ndef now_utc() -> datetime:\n  \
  \  \"\"\"Return current time as UTC-aware datetime.\"\"\"\n    return datetime.now(timezone.utc)\n\
  ```\n\nImplement get_user_tz() using the actual GeneralSettings model found in step\
  \ 1.\nIf pytz is the project standard (check requirements.txt), use pytz instead\
  \ of zoneinfo.\n\n### 3. Fix schedule_device_control_tool\nIn `aot/ai/services/aot_data_tool_service.py`\
  \ lines 712-733:\n\na. Replace get_local_now() calls with now_utc() from tz_utils.\n\
