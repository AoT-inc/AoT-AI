### Gap 3: CSS load order fix in Phase 2 lacks HTML line-by-line specificity
**Severity**: Medium — ambiguous for implementation
**Location**: Phase 2, step 1 (plan lines ~310-314)
```
"Fix CSS load order in layout_default.html: Move aot-theme-variables.css
to load before custom-light.css / custom-dark.css / effective_theme"
```
**Problem**: No HTML line numbers or CSS bundle tag identification. Phase 1
audits CSS files but does not audit layout_default.html's <link> elements.
A developer would need to re-open the HTML file and determine which <link>
lines correspond to each stylesheet. "Move aot-theme-variables.css before
custom-light.css" is clear in intent but not in which exact lines to move.
**Fix**: Phase 1 should include an audit of layout_default.html's <link> elements
(or the server-side template bundle tag) with line numbers. Phase 2 step 1
should reference specific line positions (e.g., "move line 42 before line 38").

