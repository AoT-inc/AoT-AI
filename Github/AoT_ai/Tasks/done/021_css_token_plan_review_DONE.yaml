## gaps_found

### Gap 1: --aot-color-dark referenced but never defined in token taxonomy
**Severity**: Medium — blocks Phase 5
**Location**: Phase 5, Section 5.3 (plan line ~371-373)
```
"Replace `--dark` fallback in primary button hover (aot-modal-modern.css:388)
with `--aot-color-dark` token"
```
**Problem**: `--aot-color-dark` does not appear anywhere in Sections 1.1–1.14
(token taxonomy). Phase 5 introduces this token name but the taxonomy has no
entry for it. A developer executing Phase 5 would need to guess the light/dark
values.
**Fix**: Add to Section 1.2 (semantic) or a new taxonomy section:
```
| --aot-color-dark | #141414 | #e0e0e0 | Dark text/bg for modal buttons |
```
This must be added in Phase 1 (token foundation), not deferred to Phase 5.

---

### Gap 2: aot-settings.css and aot-base.css are refactor targets with no dedicated migration phase
**Severity**: Medium — work would be missed
**Location**: files_to_refactor table (Section 2) vs. migration_phases (Section 5)

| File | Listed in Section 2? | Explicit migration phase? |
|------|---------------------|---------------------------|
| aot-theme-variables.css | Yes (P0) | Phase 1 |
| aot.css | Yes (P1) | Phase 3 |
| custom.css | Yes (P1) | Phase 4 |
| aot-modal-modern.css | Yes (P2) | Phase 5 |
| custom-light.css | Yes (P1) | Phase 2 |
| custom-dark.css | Yes (P1) | Phase 2 |
| **aot-settings.css** | **Yes (P2)** | **Phase 1 audit only** |
| **aot-base.css** | **Yes (P2)** | **Phase 1 audit only** |
| layout_default.html | Yes (P1) | Phase 2 |

Both aot-settings.css (~5 hardcoded colors) and aot-base.css (~3 hardcoded colors)
are listed as P2 refactor targets but are never migrated in any phase. Phase 1
only "audits" them; no step replaces their hardcoded values.
**Fix**: Either (a) add explicit migration sub-steps for these files within
existing phases, (b) add a Phase N covering them, or (c) explicitly mark them
as "deferred to Phase 6 optional cleanup" with rationale.

