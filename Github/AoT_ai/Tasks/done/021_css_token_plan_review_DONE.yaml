### Gap 6: Section 3.2 code samples show property declarations contradicting stated design rule
**Severity**: Low — implementation confusion
**Location**: Section 3.2 design rule (plan lines 17-19) vs. code samples
(plan lines 222-244)

Design rule states:
> "theme-switch files ... redefine ONLY the tokens that differ between themes —
> they do NOT contain any property declarations."

But the code samples for custom-light.css / custom-dark.css show:
```css
:root {
  --aot-surface-card: #ffffff;   /* this IS a property declaration */
  --aot-surface-modal: #ffffff;  /* this IS a property declaration */
}
```
Token reassignments (`--token: value;`) ARE property declarations in CSS.
The contradiction would confuse a developer implementing Phase 2.
**Fix**: Clarify Section 3.2 to distinguish: token reassignments
(`--token: value;`) ARE allowed in custom-light.css/custom-dark.css;
non-token property declarations (like `background: red;`) are forbidden.

---

### Gap 7: effective_theme Bootstrap theme mapping is ambiguous
**Severity**: Low — potential misuse
**Location**: Section 3.3 references `{{ effective_theme }}` stylesheet
**Problem**: The survey identifies 18+ Bootstrap theme files. The plan does not
specify: (a) how effective_theme is set server-side, (b) whether all 18 themes
are valid values, or (c) whether Bootstrap theme switching should also swap
which of custom-light.css/custom-dark.css is active.
**Fix**: Add a note in Section 3.3 clarifying that effective_theme (Bootstrap
theme selection) is orthogonal to the data-theme="dark" surface token system.
The light/dark token swap is handled by custom-light.css/custom-dark.css
loaded based on data-theme attribute; effective_theme determines which
Bootstrap color overlay (cerulean, darkly, etc.) is loaded on top.

---

### Gap 8: Inline dark overrides vs custom-dark.css is contradictory
**Severity**: Low — confusion but resolvable
**Location**: Section 3.1 (lines 199-200) vs. risk table (Section 6)

Section 3.1 says:
> `:root[data-theme="dark"] → dark overrides (inline in aot-theme-variables.css
> OR in custom-dark.css)`

Risk table says:
> "Consolidate dark surface overrides into custom-dark.css only; keep
> :root[data-theme="dark"] for bg-state colors only"

**Fix**: Choose one authoritative statement. Recommendation: surface overrides
belong in custom-dark.css; :root[data-theme="dark"] in aot-theme-variables.css
should only hold background-state colors (--aot-bg-*) that are theme-aware.
Update Section 3.1 to match this.

