notes: >
  Inspection performed 2026-03-27. No source files were modified.
  The background AI "near-complete" state refers to the execution infrastructure
  (APScheduler + approve_job + _execute_scheduled_action) being in place, but
  the autonomous schedule-proposal loop (daemon reading sensor data and generating
  new SchedulerJobMeta entries) is not yet implemented.
  Key files for follow-up:
    aot/ai/services/aot_data_tool_service.py (add_schedule + schedule_device_control)
    aot/databases/models/scheduler.py (model schema)
    aot/ai/services/ai_scheduler_service.py (propose/approve/execute lifecycle)
    aot/aot_flask/routes_scheduler.py (API routes)
    docker/docker-compose.yml (service topology, secrets)
  Recommend: (1) add user_id to SchedulerJobMeta and migrate, (2) rewrite
