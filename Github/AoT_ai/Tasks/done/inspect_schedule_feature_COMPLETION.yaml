task_id: "2603_AoT_ai_001_inspect_schedule_feature"
status: done
summary: >
  Schedule registration fails on both AI paths due to distinct root causes:
  conversational AI's add_schedule_tool writes Notes (not SchedulerJobMeta),
  while schedule_device_control_tool works structurally but has datetime/timezone
  fragility and auto-approval logic that misidentifies AI actions as HUMAN.
  System is NOT ready for multi-user or external-device deployment.

# ─────────────────────────────────────────────────────────────────────────────
# PART 2 — SCHEDULE FAILURE DIAGNOSIS
# ─────────────────────────────────────────────────────────────────────────────

schedule_failure:

  conversational_ai:

    # ── A. Intent / trigger detection ────────────────────────────────────────
    intent_detection:
      description: >
        mcp_aot.py defines two tools: "add_schedule" (human work memos) and
        "schedule_device_control" (device on/off reservation). The LLM selects
        the tool based on content of the user message. Intent parsing itself
        appears correct — the tool schema is well-formed and the ActionResolverRegistry
        (registry.py:47-48) maps both tool names to ScheduleResolver.
      recent_schema_changes: "unknown — git log shows no recent commits on main"

    # ── B. Data flow ─────────────────────────────────────────────────────────
    failure_point: >
      aot_data_tool_service.py:569-617 — add_schedule_tool() stores a Notes record
      (category='schedule') instead of creating a SchedulerJobMeta entry.
      The Notes table has no execution trigger; the entry is purely informational
      and is never handed to APScheduler.
    root_cause: >
      Design mismatch: "add_schedule" was implemented as a memo/note feature, not
      as an actual scheduled job. There is no code path from add_schedule_tool()
      to AISchedulerService.propose_job() or APScheduler. The job is silently
      "registered" (success returned to user) but never executed.
    evidence: >
      aot_data_tool_service.py:585 — `new_note = Notes(... category='schedule' ...)`;
      no call to AISchedulerService anywhere in add_schedule_tool();
      Notes model has no schedule_time trigger or APScheduler hook.

    # ── D. schedule_device_control path (conversational) ────────────────────
    schedule_device_control:
      failure_point: >
        Structurally reaches AISchedulerService.propose_job() → approve_job() →
        APScheduler.add_job(). However, fragile datetime handling may silently
        reschedule past-time requests to now+10s without informing the user
        (aot_data_tool_service.py:725-733). Also, propose_job is called with
        proposed_by='HUMAN' (line 756) even though the caller is the AI, and
        approval_required=False triggers immediate auto-approval (ai_scheduler_service.py:478-479).
      root_cause: >
        1. Timezone mismatch: get_local_now() returns local-aware datetime but
           fromisoformat() may return UTC-aware or naive datetime; comparison uses
           total_seconds() which may produce incorrect sign depending on tzinfo state.
        2. proposed_by='HUMAN' hardcoded — auto-approval fires without a real
           human decision; decided_by is forced to 'HUMAN' (ai_scheduler_service.py:547)
           even for system auto-approvals, making audit trail unreliable.
      evidence: >
        aot_data_tool_service.py:712 get_local_now();
        aot_data_tool_service.py:718 datetime.fromisoformat(...replace('Z','+00:00'));
        aot_data_tool_service.py:725-733 tzinfo mismatch rescue block;
        ai_scheduler_service.py:478-479 auto-approve when proposed_by==HUMAN and not approval_required;
        ai_scheduler_service.py:547 decided_by='HUMAN' always.

  background_ai:

    # ── D. Background AI — implementation state ──────────────────────────────
    implementation_state: >
      APScheduler is initialized in app.py:218-220 via AISchedulerService.init_app().
      Periodic system jobs (mcp_health, weather_summary, context_broadcast,
      context_source_sync) are registered and running. The _execute_scheduled_action()
      wrapper (ai_scheduler_service.py:997-1039) is implemented and routes through
      SafetyService → AIActionService with _approved=True.
      MISSING: Background AI does not autonomously propose new SchedulerJobMeta
      entries based on sensor data or environmental patterns. It executes
      already-approved jobs but does not originate schedule suggestions.
    failure_point: >
      ai_scheduler_service.py:997 — _execute_scheduled_action() checks for _flask_app;
      if the daemon container starts before the Flask app is fully initialized,
      _flask_app is None and all jobs immediately return an error without retry.
    root_cause: >
      1. App-context race: _flask_app is set in init_app() which is called from
         aot_flask/app.py create_app(). If APScheduler fires a job during startup
         before create_app() completes, _flask_app is None → "Working outside of
         application context" error.
      2. No autonomous schedule proposal: Background AI (aot_daemon) currently only
         executes pre-registered jobs; it does not analyze environmental state and
         propose new schedules independently. This is the "near-complete" gap.
    evidence: >
      ai_scheduler_service.py:332 `_flask_app = app` in init_app();
      ai_scheduler_service.py:1002 `if not _flask_app: logger.error("...Missing app context")`;
      Historic log pattern (2026-03-18/19): "Job mcp_health_check failed: Working outside of application context."
      aot_daemon service in docker-compose.yml runs independently of aot-app readiness check.

# ─────────────────────────────────────────────────────────────────────────────
# PART 3 — MULTI-USER AND MULTI-DEVICE READINESS
# ─────────────────────────────────────────────────────────────────────────────

multi_device_readiness:

  authentication:
    status: "partial"
    notes: >
      Routes use @login_required decorator (routes_scheduler.py verified).
      However, authentication protects route entry only — ScheduleResolver and
      AISchedulerService receive no user identity; there is no per-request
      auth context propagated through the call chain. External API access
      (non-browser) depends on session cookie only; no API key or JWT support found.

  external_access:
    status: "not ready"
    notes: >
      Port 8084 exposed directly in docker-compose.yml:11 without TLS termination.
      app.py:276 explicitly disables force_https in Docker environment.
      No nginx/reverse-proxy with HTTPS configured in the compose file.
      No CORS policy or allowed-hosts restriction found for external clients.

  concurrent_access:
    status: "partial"
    notes: >
      APScheduler configured with max_instances=1 and coalesce=True per job,
      preventing duplicate executions of the same job. However, SQLite
      (aot_scheduler.db) does not support true concurrent writes — under
      multi-process or multi-threaded load, write contention can cause
      "database is locked" errors. SQLAlchemyJobStore uses SQLite by default.
      No row-level locking or optimistic concurrency in SchedulerJobMeta CRUD.
      propose_job() and approve_job() perform separate db.session.commit() calls
      with no transactional guard between them.

  configuration:
    status: "partial"
    notes: >
      DATABASE_PATH, INFLUXDB_URL, and most service addresses use environment
      variables. CRITICAL: InfluxDB credentials are hardcoded in
      docker-compose.yml (password: mmdu77sj3nIoiajjs visible in plain text).
      SECRET_KEY and other Flask secrets: unknown — not inspected in this pass.
      Recommend audit of all docker-compose.yml env sections for secrets.

  api_contract:
    status: "not ready"
    notes: >
      No OpenAPI/Swagger spec file found in the project tree.
      Routes defined in routes_scheduler.py and routes_ai.py use Flask Blueprint
      with no schema documentation. External clients have no machine-readable
      contract to reference. Request/response shapes are only inferrable from
      source code inspection.

# ─────────────────────────────────────────────────────────────────────────────
# PRIORITY ISSUES
# ─────────────────────────────────────────────────────────────────────────────

priority_issues:

  - priority: P1
    issue: >
      add_schedule_tool writes Notes instead of SchedulerJobMeta — human work
      schedules are stored as memos and never executed by APScheduler.
    location: >
      aot/ai/services/aot_data_tool_service.py:569-617

  - priority: P1
    issue: >
      SchedulerJobMeta model has no user_id / owner_id field — all schedules
      from all users are co-mingled; per-user isolation is impossible without
      schema change.
    location: >
      aot/databases/models/scheduler.py (entire model definition)

  - priority: P1
    issue: >
      Background daemon has no service-dependency wait on Flask app readiness;
      APScheduler may fire jobs before _flask_app is set, causing
      "Working outside of application context" errors.
    location: >
      aot/ai/services/ai_scheduler_service.py:997-1002;
      docker/docker-compose.yml (no depends_on healthcheck for aot-app)

  - priority: P2
    issue: >
      Datetime timezone handling in schedule_device_control_tool mixes local-aware
      and UTC-aware datetime objects; comparison logic silently reschedules
      past-time requests to now+10s without user notification.
    location: >
      aot/ai/services/aot_data_tool_service.py:712-733

  - priority: P2
    issue: >
      proposed_by='HUMAN' hardcoded in AI-generated schedule calls and
      decided_by always set to 'HUMAN' in approve_job() — audit trail is
      systematically misleading; human and AI approvals indistinguishable.
    location: >
      aot/ai/services/aot_data_tool_service.py:756;
      aot/ai/services/ai_scheduler_service.py:547

  - priority: P2
    issue: >
      InfluxDB password hardcoded in docker-compose.yml plain text; no secret
      management. Full secrets audit needed before external exposure.
    location: >
      docker/docker-compose.yml:66

  - priority: P3
    issue: >
      APScheduler backed by SQLite (aot_scheduler.db) — does not support
      concurrent writes; will produce "database is locked" errors under
      multi-user load.
    location: >
      aot/ai/services/ai_scheduler_service.py (SCHEDULER_DB_PATH definition)

  - priority: P3
    issue: >
      No OpenAPI/Swagger spec; external clients and IoT devices have no
      machine-readable API contract.
    location: >
      aot/aot_flask/routes_scheduler.py (all routes undocumented)

  - priority: P3
    issue: >
      No HTTPS/TLS on port 8084; force_https explicitly disabled in Docker
      environment. External device communication is unencrypted.
    location: >
      docker/docker-compose.yml:11; aot/aot_flask/app.py:276

