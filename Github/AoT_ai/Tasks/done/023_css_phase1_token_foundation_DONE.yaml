## existing_token_conflicts_found

conflict_note:
  The Supplement 7 authority rule states that :root[data-theme="dark"] in aot-theme-variables.css
  should contain ONLY --aot-bg-* state tokens (device/state logic). However, the existing
  :root[data-theme="dark"] block also contains:
    - Semantic color overrides (--aot-color-success, --aot-color-warning, --aot-color-danger, --aot-color-info)
    - Brand/text color overrides (--aot-color-brand-accent, --aot-color-text-primary, --aot-color-text-secondary, --aot-color-dark)

  Per the authority rule, these should live in custom-dark.css (surface token overrides),
  not in aot-theme-variables.css :root[data-theme="dark"].

  However, since the Phase 1 task rule (5) prohibits renaming existing tokens, these
  extra dark-override tokens were NOT removed. They represent no functional harm to the
  current system — the consumer CSS files are unchanged.

  Resolution deferred to Phase 2 (CSS load order fix + custom-dark.css population),
  where custom-dark.css should be populated with surface token dark overrides that
  currently exist in :root[data-theme="dark"] in aot-theme-variables.css.

