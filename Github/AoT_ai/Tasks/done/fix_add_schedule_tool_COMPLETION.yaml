task_id: "2603_AoT_ai_003_fix_add_schedule_tool"
status: done
summary: >
  Rewrote add_schedule_tool() in aot_data_tool_service.py to route through
  AISchedulerService.propose_job() and approve_job() instead of creating Notes records.
  Also patched approve_job() in ai_scheduler_service.py to accept a decided_by parameter
  and skip APScheduler registration for action_type='human' jobs.
  Both files pass ast.parse syntax check. Indexing sync completed with VERIFY OK.

files_modified:
  - path: "aot/ai/services/aot_data_tool_service.py"
    anchor: "add_schedule_tool (line ~569)"
    change: >
      Replaced Notes creation block with AISchedulerService.propose_job(
        action_type='human', target_id='none', proposed_by='AI',
        approval_required=False, source_type='human', schedule_time=run_at
      ) followed by approve_job(meta.id, decided_by='AI').
      Return value changed from note_id to job_id (SchedulerJobMeta.unique_id).

  - path: "aot/ai/services/ai_scheduler_service.py"
    anchor: "approve_job (line ~526)"
    change: >
      Added decided_by='HUMAN' parameter (backward compatible default).
      Added early-return branch for action_type='human' that commits and returns
      without calling scheduler.add_job(), ensuring no APScheduler trigger is created
      for human schedule entries.

notes_path_removed: false
notes_on_removal: >
  The Notes table is not written by add_schedule_tool any longer.
  No existing Notes rows with category='schedule' were removed — those are
  historical data and must be cleaned up separately if desired.
  ai_agent_service.py line 998 still documents 'These go to Notes' in its
  system prompt — that comment should be updated separately to say
  'These go to SchedulerJobMeta (action_type=human)'.

ai_context_query: exists
ai_context_query_detail: >
  AIContextService.get_upcoming_tasks() (ai_context_service.py line 662) queries
  the AITask model, NOT SchedulerJobMeta. Human schedules registered via
  add_schedule_tool will NOT appear in get_upcoming_tasks() context injection.
  Recommendation: add a SchedulerJobMeta query for action_type='human' / state='PENDING'
  in get_upcoming_tasks() or a new get_human_schedule_context() helper.
  This is out of scope for the current task and noted for follow-up.

schedule_type_field: >
  SchedulerJobMeta has no schedule_type or user_id columns. The task specification
  referenced ScheduleType.human which does not exist in the codebase.
  The implementation uses action_type='human' and source_type='human' (existing fields)
  to distinguish human work items from device-control jobs. No schema migration needed.

