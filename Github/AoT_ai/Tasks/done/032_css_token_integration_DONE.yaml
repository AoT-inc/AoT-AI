## 4. css_load_order

Correct load order (verified in layout.html):

1. bootstrap.min.css (vendor)
2. simple-sidebar.css (vendor)
3. aot-theme-variables.css (token definitions)
4. custom-dark.css OR custom-light.css (conditional theme override)
5. effective_theme (Bootstrap theme)
6. custom.css (consumer CSS)
7. aot-base.css (base components)
8. aot-modal-modern.css (modal enhancements)

---

## 5. theme_switching_mechanism

Theme switching uses the `data-theme="dark"` attribute on `:root`:

1. layout.html evaluates `{% if effective_theme == 'custom-dark.css' %}`
2. Sets `data-theme="dark"` on `<html>` element
3. CSS load order ensures custom-dark.css overrides tokens AFTER aot-theme-variables.css
4. Both :root block in custom-dark.css and :root[data-theme="dark"] in aot-theme-variables.css apply

Dark mode authority rule:
  - aot-theme-variables.css :root[data-theme="dark"] → ONLY --aot-bg-* state tokens
  - custom-dark.css :root → surface, semantic, and brand/text token overrides

