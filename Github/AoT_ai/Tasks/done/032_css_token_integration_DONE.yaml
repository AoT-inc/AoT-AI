## 6. how_to_use_tokens

### 6.1 For new UI components
```css
.my-component {
  background-color: var(--aot-surface-card);
  color: var(--aot-color-text-primary);
  border: 1px solid var(--aot-border-neutral);
  box-shadow: var(--aot-shadow-sm);
  padding: var(--aot-space-3);
}
```

### 6.2 For buttons
```css
.btn-primary {
  background-color: var(--aot-btn-bg-primary);
  color: var(--aot-btn-color-primary);
  border: 1px solid var(--aot-btn-border-primary);
  font-size: var(--aot-btn-font-size);
}
```

### 6.3 For note components
```css
.note-card {
  background-color: var(--aot-note-card-bg);
  border-color: var(--aot-note-card-border);
  box-shadow: var(--aot-note-card-shadow);
}
```

### 6.4 Always use tokens, not hardcoded values
- NEVER use #hex, rgb(), or rgba() directly in component CSS
- ALWAYS use var(--aot-*) tokens
- Fallbacks are acceptable: `var(--aot-surface-card, #ffffff)`

