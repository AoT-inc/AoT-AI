## 3. file_inventory_and_roles

### 3.1 aot-theme-variables.css (SOURCE OF TRUTH)
- Location: aot/aot_flask/static/css/aot-theme-variables.css
- Role: Defines ALL --aot-* tokens in :root
- Contains: :root block (all tokens), :root[data-theme="dark"] block (bg-state overrides only)
- Authority rule: :root[data-theme="dark"] holds ONLY --aot-bg-* state tokens
- Do NOT add surface or semantic color overrides here

### 3.2 custom-light.css (LIGHT THEME OVERRIDES)
- Location: aot/aot_flask/static/css/custom-light.css
- Role: Surface token overrides for light theme
- Contains: :root token reassignments ONLY (no property declarations)
- Token count: 26 light surface tokens

### 3.3 custom-dark.css (DARK THEME OVERRIDES)
- Location: aot/aot_flask/static/css/custom-dark.css
- Role: Surface + semantic + brand/text token overrides for dark theme
- Contains: :root token reassignments ONLY (no property declarations)
- Token count: 34 dark tokens
- Resolved conflict: semantic and brand/text overrides moved here from aot-theme-variables.css :root[data-theme="dark"]

### 3.4 aot.css (BOOTSTRAP PALETTE BRIDGE)
- Location: aot/aot_flask/static/css/aot.css
- Role: Bootstrap palette mapped to AoT tokens
- Status: All hardcoded hex values replaced with var() references
- Contains: Bootstrap CSS variable overrides using --aot-* tokens

### 3.5 custom.css (CONSUMER CSS)
- Location: aot/aot_flask/static/css/custom.css
- Role: AoT-specific component styles
- Note: Phase 4 target selectors (.dropdown-upgrade, .dropdown-item-upgrade) already use tokens
- Remaining hardcoded values: 5 values at lines 125, 132, 142, 143, 216 (widget-graph, modal styles — outside Phase 4 scope)

### 3.6 aot-base.css (CONSOLIDATED COMPONENT CSS)
- Location: aot/aot_flask/static/css/aot-base.css
- Role: Note card system and other base components
- Contains: .note-card, .note-tag-chip, .note-fab, .note-search-bar, .expand-toggle-btn
- Note: .note-fab uses var(--brand-primary) instead of --aot-note-fab-bg (deviation, not corrected)

### 3.7 aot-modal-modern.css (MODAL ENHANCEMENTS)
