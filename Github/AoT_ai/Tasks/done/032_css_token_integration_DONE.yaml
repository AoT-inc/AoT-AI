## 9. naming_convention_quick_reference

Pattern: `--aot-{category}-{variant}`

| Category Prefix | Type | Examples |
|----------------|------|---------|
| --aot-color-* | Color | --aot-color-primary, --aot-color-brand-primary |
| --aot-bg-* | Background state | --aot-bg-active, --aot-bg-inactive |
| --aot-btn-* | Button | --aot-btn-bg-primary, --aot-btn-color-primary |
| --aot-border-* | Border | --aot-border-neutral, --aot-border-form |
| --aot-surface-* | Surface | --aot-surface-card, --aot-surface-modal |
| --aot-note-* | Note component | --aot-note-card-bg, --aot-note-tag-text |
| --aot-modal-* | Modal | --aot-modal-title-text, --aot-modal-backdrop |
| --aot-space-* | Spacing | --aot-space-1 through --aot-space-6 |
| --aot-font-* | Typography | --aot-font-family, --aot-font-size-sm |
| --aot-geometry-* | Geometry | (implicit: --aot-btn-height, --aot-btn-radius) |
| --aot-z-* | z-index | --aot-z-modal, --aot-z-dropdown |
| --aot-shadow-* | Shadow | --aot-shadow-sm, --aot-shadow-modal |

