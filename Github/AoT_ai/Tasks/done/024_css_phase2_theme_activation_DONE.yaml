## dark_block_conflict_resolution

### Conflict Identified (Phase 1 DONE report)

Phase 1 found that :root[data-theme="dark"] in aot-theme-variables.css contained
8 tokens that violated the authority rule (Section 3.1 of Plan 019):

Authority rule states: ":root[data-theme="dark"] in aot-theme-variables.css holds
ONLY --aot-bg-* state tokens. Surface token dark overrides belong in custom-dark.css."

Conflicting tokens in aot-theme-variables.css :root[data-theme="dark"]:
  - Semantic overrides: --aot-color-success, --aot-color-warning,
    --aot-color-danger, --aot-color-info
  - Brand/text overrides: --aot-color-brand-accent, --aot-color-text-primary,
    --aot-color-text-secondary, --aot-color-dark

### Resolution Applied

Step 1: Added semantic color overrides to custom-dark.css (Section 1.2)
  - --aot-color-success: #7aa852
  - --aot-color-warning: #e09509
  - --aot-color-danger: #c94444
  - --aot-color-info: #0287b8

Step 2: Added brand/text color overrides to custom-dark.css (Section 1.1)
  - --aot-color-brand-accent: #1a1a1a
  - --aot-color-text-primary: #F3F6F5
  - --aot-color-text-secondary: #D1D5D5
  - --aot-color-dark: #e0e0e0

Step 3: Removed the 8 conflicting tokens from aot-theme-variables.css
:root[data-theme="dark"], replacing them with a documentation note explaining
the resolution.

### Result

aot-theme-variables.css :root[data-theme="dark"] now contains ONLY the 7
bg-state tokens (--aot-bg-*) per the authority rule.

custom-dark.css now contains ALL surface token dark overrides (34 tokens total),
including the 8 that were previously conflicting.

