<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AoT Marker Manager Test</title>
  
  <!-- MapLibre GL CSS -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    #map { width: 100%; height: 500px; }
    
    .controls {
      padding: 15px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }
    .controls h2 { margin-bottom: 10px; font-size: 16px; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .btn-primary { background: #2196F3; color: white; }
    .btn-primary:hover { background: #1976D2; }
    .btn-success { background: #4CAF50; color: white; }
    .btn-success:hover { background: #388E3C; }
    .btn-warning { background: #FF9800; color: white; }
    .btn-warning:hover { background: #F57C00; }
    .btn-danger { background: #f44336; color: white; }
    .btn-danger:hover { background: #D32F2F; }
    .btn-secondary { background: #9E9E9E; color: white; }
    .btn-secondary:hover { background: #757575; }
    
    #stats {
      padding: 15px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }
    #stats pre { 
      background: #f8f8f8; 
      padding: 10px; 
      border-radius: 4px; 
      overflow-x: auto;
      max-height: 200px;
    }
    
    .aot-marker-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .aot-marker-icon:hover {
      transform: scale(1.2);
    }
    
    .test-marker-site {
      background-color: #2196F3 !important;
    }
    .test-marker-zone {
      background-color: #4CAF50 !important;
    }
    .test-marker-facility {
      background-color: #FF9800 !important;
    }
    
    .maplibregl-popup {
      max-width: 300px;
    }
    .aot-popup .maplibregl-popup-content {
      padding: 15px;
      border-radius: 6px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.25);
    }
    .popup-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .popup-content {
      font-size: 13px;
      color: #666;
    }
    .popup-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 6px;
    }
    .popup-status.active { background: #E8F5E9; color: #4CAF50; }
    .popup-status.inactive { background: #FFEBEE; color: #f44336; }
  </style>
</head>
<body>
  <div class="controls">
    <h2>AoT Marker Manager Test</h2>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="testAddSiteMarker()">Add Site</button>
      <button class="btn btn-success" onclick="testAddZoneMarkers()">Add Zones</button>
      <button class="btn btn-warning" onclick="testAddFacilityMarkers()">Add Facilities</button>
      <button class="btn btn-secondary" onclick="testAddCustomMarker()">Custom HTML</button>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-danger" onclick="testClearAll()">Clear All</button>
      <button class="btn btn-secondary" onclick="testFitBounds()">Fit Bounds</button>
      <button class="btn btn-secondary" onclick="testGetStats()">Get Stats</button>
      <button class="btn btn-secondary" onclick="testGroupMarkers()">Create Group</button>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="testEventHandlers()">Test Events</button>
      <button class="btn btn-secondary" onclick="testLeafletAPI()">Leaflet API</button>
    </div>
  </div>
  
  <div id="map"></div>
  
  <div id="stats">
    <strong>Statistics:</strong>
    <pre id="stats-output">No markers yet</pre>
  </div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  
  <!-- AoT Marker Manager -->
  <script src="aot-maplibre-marker.js"></script>

  <script>
    // Initialize map
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'osm': {
            type: 'raster',
            tiles: [
              'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
              'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
              'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
            ],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap contributors'
          }
        },
        layers: [
          {
            id: 'osm',
            type: 'raster',
            source: 'osm',
            minzoom: 0,
            maxzoom: 19
          }
        ]
      },
      center: [127.0, 37.5],
      zoom: 10
    });

    // Initialize marker manager
    let markerManager = null;

    map.on('load', function() {
      console.log('[Test] Map loaded');
      
      // Create marker manager
      markerManager = AoTMarkerManager.create(map, {
        defaultIcons: true,
        showLabels: true
      });
      
      console.log('[Test] Marker manager created:', markerManager.id);
      updateStats();
    });

    // Test data
    const testSites = [
      { id: 'site-1', coordinates: [127.0, 37.5], label: 'Site A' },
      { id: 'site-2', coordinates: [127.1, 37.6], label: 'Site B' },
      { id: 'site-3', coordinates: [126.9, 37.4], label: 'Site C' }
    ];

    const testZones = [
      { id: 'zone-1', coordinates: [127.02, 37.52], label: 'Zone 1' },
      { id: 'zone-2', coordinates: [127.05, 37.54], label: 'Zone 2' },
      { id: 'zone-3', coordinates: [127.08, 37.56], label: 'Zone 3' },
      { id: 'zone-4', coordinates: [127.11, 37.58], label: 'Zone 4' }
    ];

    const testFacilities = [
      { id: 'facility-1', coordinates: [127.03, 37.51], label: 'Factory 1' },
      { id: 'facility-2', coordinates: [127.04, 37.52], label: 'Factory 2' },
      { id: 'facility-3', coordinates: [127.05, 37.53], label: 'Factory 3' },
      { id: 'facility-4', coordinates: [127.06, 37.54], label: 'Factory 4' },
      { id: 'facility-5', coordinates: [127.07, 37.55], label: 'Factory 5' }
    ];

    // Test functions
    function testAddSiteMarker() {
      if (!markerManager) return;
      
      const site = testSites[Math.floor(Math.random() * testSites.length)];
      const uniqueId = site.id + '-' + Date.now();
      
      markerManager.addSiteMarker(uniqueId, {
        coordinates: [
          site.coordinates[0] + (Math.random() - 0.5) * 0.1,
          site.coordinates[1] + (Math.random() - 0.5) * 0.1
        ],
        label: site.label + ' (New)',
        popup: {
          content: '<div class="popup-title">' + site.label + '</div>' +
                   '<div class="popup-content">Site type: Agricultural</div>' +
                   '<div class="popup-content">Area: 10,000 m²</div>' +
                   '<span class="popup-status active">Active</span>',
          maxWidth: 300
        }
      });
      
      console.log('[Test] Added site marker:', uniqueId);
      updateStats();
    }

    function testAddZoneMarkers() {
      if (!markerManager) return;
      
      const zonesToAdd = testZones.slice(0, 2).map(z => ({
        ...z,
        id: z.id + '-' + Date.now(),
        coordinates: [
          z.coordinates[0] + (Math.random() - 0.5) * 0.05,
          z.coordinates[1] + (Math.random() - 0.5) * 0.05
        ],
        popup: {
          content: '<div class="popup-title">' + z.label + '</div>' +
                   '<div class="popup-content">Irrigation Zone</div>' +
                   '<span class="popup-status active">Active</span>'
        }
      }));
      
      const added = markerManager.addZoneMarkers(zonesToAdd);
      console.log('[Test] Added zone markers:', added.length);
      updateStats();
    }

    function testAddFacilityMarkers() {
      if (!markerManager) return;
      
      const facilitiesToAdd = testFacilities.slice(0, 3).map(f => ({
        ...f,
        id: f.id + '-' + Date.now(),
        coordinates: [
          f.coordinates[0] + (Math.random() - 0.5) * 0.03,
          f.coordinates[1] + (Math.random() - 0.5) * 0.03
        ],
        popup: {
          content: '<div class="popup-title">' + f.label + '</div>' +
                   '<div class="popup-content">Facility monitoring</div>' +
                   '<span class="popup-status active">Online</span>'
        }
      }));
      
      const added = markerManager.addFacilityMarkers(facilitiesToAdd);
      console.log('[Test] Added facility markers:', added.length);
      updateStats();
    }

    function testAddCustomMarker() {
      if (!markerManager) return;
      
      const uniqueId = 'custom-' + Date.now();
      const html = '<div style="font-size:20px;">🚜</div>';
      
      markerManager.addCustomMarker(uniqueId, {
        coordinates: [
          127.0 + (Math.random() - 0.5) * 0.2,
          37.5 + (Math.random() - 0.5) * 0.2
        ],
        html: html,
        className: 'custom-harvest-marker',
        popup: {
          content: '<div class="popup-title">🚜 Custom Marker</div>' +
                   '<div class="popup-content">This is a custom HTML marker</div>'
        }
      });
      
      console.log('[Test] Added custom marker:', uniqueId);
      updateStats();
    }

    function testClearAll() {
      if (!markerManager) return;
      
      const count = markerManager.clearAllMarkers();
      console.log('[Test] Cleared markers:', count);
      updateStats();
    }

    function testFitBounds() {
      if (!markerManager) return;
      
      const success = markerManager.fitBounds({ padding: 50, maxZoom: 15 });
      console.log('[Test] Fit bounds:', success);
    }

    function testGetStats() {
      if (!markerManager) return;
      
      const stats = markerManager.getStats();
      console.log('[Test] Stats:', JSON.stringify(stats, null, 2));
      
      document.getElementById('stats-output').textContent = JSON.stringify(stats, null, 2);
    }

    function testGroupMarkers() {
      if (!markerManager) return;
      
      const markers = markerManager.getAllMarkers();
      if (markers.length < 2) {
        console.warn('[Test] Need at least 2 markers to create a group');
        return;
      }
      
      const markerIds = markers.slice(0, Math.min(3, markers.length)).map(m => m.id);
      const groupId = 'test-group-' + Date.now();
      
      const success = markerManager.addMarkerGroup(groupId, markerIds, {
        label: 'Test Group',
        color: '#E91E63'
      });
      
      console.log('[Test] Created group:', groupId, 'success:', success);
      
      // Toggle group visibility after 2 seconds
      setTimeout(() => {
        markerManager.setGroupVisibility(groupId, false);
        setTimeout(() => {
          markerManager.setGroupVisibility(groupId, true);
        }, 1000);
      }, 2000);
      
      updateStats();
    }

    function testEventHandlers() {
      if (!markerManager) return;
      
      const markers = markerManager.getAllMarkers();
      if (markers.length === 0) {
        console.warn('[Test] No markers to attach events to');
        return;
      }
      
      const marker = markers[0];
      
      marker.on('click', function(data) {
        console.log('[Event] Marker clicked:', data.markerId, data.coordinates);
        alert('Marker clicked: ' + data.markerId);
      });
      
      marker.on('mouseover', function(data) {
        console.log('[Event] Marker hover:', data.markerId);
      });
      
      console.log('[Test] Attached event handlers to marker:', marker.id);
    }

    function testLeafletAPI() {
      if (!markerManager) return;
      
      // Test Leaflet-compatible API
      const leafletMarker = AoTMarkerManager.marker([37.5, 127.0], {
        draggable: true,
        title: 'Leaflet-style marker'
      });
      
      leafletMarker.addTo(map);
      
      leafletMarker.bindPopup('<b>Leaflet API Test</b><br>Compatible marker!');
      
      // Attach click event
      leafletMarker.on('click', function() {
        console.log('[Leaflet API] Marker clicked!');
        leafletMarker.openPopup();
      });
      
      console.log('[Test] Created Leaflet-compatible marker');
      updateStats();
    }

    function updateStats() {
      if (!markerManager) return;
      
      const stats = markerManager.getStats();
      document.getElementById('stats-output').textContent = JSON.stringify(stats, null, 2);
    }

    // Initial stats update
    map.on('load', updateStats);
  </script>
</body>
</html>
