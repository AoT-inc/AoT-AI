{% if 'gpio_location' in dict_options['options_enabled'] or
      'gpio_location' in dict_options['options_disabled']
  %}

<div class="aot-modal-option-row">
  <label class="aot-modal-option-label">{{form.gpio_location.label(class_='mb-0')}}</label>
  <div class="aot-modal-option-control">
    {{form.gpio_location(class_='form-control aot-modern-select', value=each_device.gpio_location, **{'title': dict_translation['gpio_location']['phrase']})}}
  </div>
</div>

{% endif %}
