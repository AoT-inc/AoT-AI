<div id="geo_status_{{each_input.unique_id}}"
  class="grid-stack-item-content {% if each_input.is_activated -%}active-background{% else -%}inactive-background{% endif %} row small-gutters aot-entry-item">

    <div class="aot-entry-drag-handle">
        <i class="fa fa-grip-lines"></i>
    </div>

    <div class="aot-entry-content-item aot-col-name">
        <input id="geo_name_{{each_input.unique_id}}" class="form-control aot-entry-name-input"
               disabled="" value="{{ each_input.name }}" type="text" title="{{ each_input.name }}">
    </div>

    <div class="aot-entry-content-item aot-col-uuid">
        <input class="form-control btn aot-entry-uuid-btn aot-entry-btn-base"
               type="button"
               onclick="setClipboard('{{each_input.unique_id}}')" title="UUID: {{each_input.unique_id}}"
               value="{% if dict_inputs and each_input.device in dict_inputs %}{{ dict_inputs[each_input.device]['input_name'] }}{% else %}{{ each_input.device }}{% endif %}">
    </div>

    <div class="aot-entry-actions aot-col-action">
        <input {% if each_input.is_activated -%}style="display: none"{% endif %}
               onclick="return $(this).processRequest(this, 'geo_input_activate');" name="geo_input_activate"
               id="geo_activate_{{each_input.unique_id}}" class="form-control btn btn-primary aot-entry-btn-base" type="button"
               value="{{_('Activate')}}" />
        <input {% if not each_input.is_activated -%}style="display: none" {% endif %}
            onclick="return $(this).processRequest(this, 'geo_input_deactivate');" name="geo_input_deactivate"
            id="geo_deactivate_{{each_input.unique_id}}" class="form-control btn btn-primary aot-entry-btn-base" type="button"
            value="{{_('Deactivate')}}" />
    </div>

    <div class="aot-entry-settings">
        <a class="btn p-0" data-toggle="modal" data-target="#modal_config_{{each_input.unique_id}}">
            <i class="fas fa-cog"></i>
        </a>
    </div>
</div>

<div class="modal fade aot-option-modal" id="modal_config_{{each_input.unique_id}}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-xl aot-modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{{ each_input.name }} {{ _('Settings') }}</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>{{ _('This is the GIS detailed settings screen. (To be implemented)') }}</p>
            </div>
        </div>
    </div>
</div>
