<div class="aot-modal-container">
  <div class="aot-modal-option-row">
    <label class="aot-modal-option-label">{{ _('Output') }}</label>
    <div class="aot-modal-option-control">
      <select class="form-control aot-modern-select selectpicker aot-standard-select" id="unique_id_1" name="unique_id_1" data-placement="top" title="{{_('Execute this condition when this output turns on or off.')}}">
        <option value="">{{dict_translation['select_one']['title']}}</option>
        {%- for each_output in choices_output_channels if 'on_off' in each_output['types'] -%}
          <option value="{{each_output['value']}}"{% if each_function.unique_id_1 == each_output['value'].split(",")[0] and each_function.unique_id_2 == each_output['value'].split(",")[1] %} selected{% endif %}>{{each_output['item']}}</option>
        {%- endfor -%}
      </select>
    </div>
  </div>
  <div class="aot-modal-option-row">
    <label class="aot-modal-option-label">{{form_trigger.output_state.label(class_='mb-0')}}</label>
    <div class="aot-modal-option-control">
      <select class="form-control aot-modern-select selectpicker aot-standard-select" id="output_state" name="output_state" data-placement="top" title="{{_('Select which action triggers this condition (On or Off)')}}">
        <option value="">{{dict_translation['select_one']['title']}}</option>
        <option value="on_duration_none"{% if each_function.output_state == 'on_duration_none' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('No Duration')}})</option>
        <option value="on_duration_any"{% if each_function.output_state == 'on_duration_any' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Any Duration')}})</option>
        <option value="on_duration_none_any"{% if each_function.output_state == 'on_duration_none_any' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('No Duration or Any Duration')}})</option>
        <option value="on_duration_equal"{% if each_function.output_state == 'on_duration_equal' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Equal to Duration')}})</option>
        <option value="on_duration_greater_than"{% if each_function.output_state == 'on_duration_greater_than' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Greater than Duration')}})</option>
        <option value="on_duration_equal_greater_than"{% if each_function.output_state == 'on_duration_equal_greater_than' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Greater than or Equal to Duration')}})</option>
        <option value="on_duration_less_than"{% if each_function.output_state == 'on_duration_less_than' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Less than Duration')}})</option>
        <option value="on_duration_equal_less_than"{% if each_function.output_state == 'on_duration_equal_less_than' %} selected{% endif %}>{{dict_translation['on']['title']}} ({{_('Less than or Equal to Duration')}})</option>
        <option value="off"{% if each_function.output_state == 'off' %} selected{% endif %}>{{dict_translation['off']['title']}}</option>
      </select>
    </div>
  </div>
  <div class="aot-modal-option-row">
    <label class="aot-modal-option-label">{{form_trigger.output_duration.label(class_='mb-0')}}</label>
    <div class="aot-modal-option-control">
     {{form_trigger.output_duration(class_='form-control aot-modern-input', value=each_function.output_duration, **{'title':_('(Optional) Set a specific duration for the condition to trigger when the output on duration matches this value'), 'size':'3'})}}
    </div>
  </div>
</div>
