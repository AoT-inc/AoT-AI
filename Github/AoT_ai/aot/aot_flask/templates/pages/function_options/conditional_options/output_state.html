<div class="aot-modal-body-text mb-2">
  <strong>[{{_('Condition')}}] {{_('Output State')}}</strong>:
  <strong>self.condition("{{each_condition.unique_id.split('-')[0]}}")</strong>
  {{_('Returns "on" if output is on, "off" if off, or duty cycle value if PWM.')}}
</div>

<div class="aot-modal-option-row">
  {{form_conditional_conditions.output_id.label(class_='aot-modal-option-label mb-0')}}
  <div class="aot-modal-option-control">
    <select class="form-control aot-modern-select form-tooltip form-dropdown" id="output_id" name="output_id" style="width: 100%;" title="" data-original-title="{{_('Select output to get state from')}}">
        <option value="">{{dict_translation['select_one']['title']}}</option>
      {% for each_output_form in choices_output_channels -%}
        <option value="{{each_output_form['value']}}"{% if each_condition.output_id == each_output_form['value'] %} selected{% endif %}>{{each_output_form['item']}}</option>
      {% endfor -%}
      </select>
  </div>
</div>
