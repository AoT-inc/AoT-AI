<div class="aot-modal-body-text mb-2">
  <strong>[{{_('Condition')}}] {{_('Controller Status')}}</strong>: <strong>self.condition("{{each_condition.unique_id.split('-')[0]}}")</strong> {{_('Returns True if controller is running, otherwise False.')}}
</div>
<div class="aot-modal-option-row">
  {{form_conditional_conditions.controller_id.label(class_='aot-modal-option-label mb-0')}}
  <div class="aot-modal-option-control">
    <select class="form-control aot-modern-select form-tooltip form-dropdown" id="controller_id" name="controller_id" style="width: 100%;" title="" data-original-title="{{_('Select controller to get info from')}}">
        <option value="">{{dict_translation['select_one']['title']}}</option>
      {% for each_cont in choices_controller_ids -%}
        <option value="{{each_cont['value']}}"{% if each_condition.controller_id == each_cont['value'] %} selected{% endif %}>{{each_cont['item']}}</option>
      {% endfor -%}
      </select>
  </div>
</div>
