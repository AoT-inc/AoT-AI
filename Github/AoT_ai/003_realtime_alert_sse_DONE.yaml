task: realtime_alert_sse
status: DONE
syntax_check_result: ALL OK (py_compile passed for all 4 Python files)
test_result: no_test_suite_found

sse_endpoint_path: /api/alerts/stream
  blueprint: routes_ai_api (existing AI blueprint)
  method: GET
  auth: login_required
  mimetype: text/event-stream
  headers:
    Cache-Control: no-cache
    X-Accel-Buffering: no
    Connection: keep-alive
  keepalive_interval_seconds: 25

files_created:
  - path: aot/utils/sse_manager.py
    description: >
      Singleton SSEManager class. register(client_id) returns a per-client queue.Queue;
      unregister(client_id) removes it; broadcast(event_type, payload) serializes and
      enqueues the SSE message to all connected clients with dead-client cleanup on
      queue.Full. Thread-safe via threading.Lock.

files_modified:
  - path: aot/ai/services/notification_service.py
    change: >
      Implemented send_webui_toast (was stub returning not_implemented).
      Now calls sse_manager.broadcast("anomaly_alert", {message, level, duration,
      timestamp}) so every connected browser client receives the event in real time.
    method_signature_unchanged: true

  - path: aot/ai/services/ai_anomaly_detector.py
    change: >
      In trigger_alerts, after send_anomaly_alert call, added send_webui_toast call
      with user_id='broadcast', message=[LEVEL] Anomaly detected: {scope_name},
      level=error|warning, duration=8000ms(critical)|5000ms(warning).

  - path: aot/aot_flask/routes_ai_api.py
    change: >
      Added alerts_stream() view at GET /api/alerts/stream. Uses stream_with_context
      generator that registers the client, sends : connected keepalive on connect, then
      yields queued events; emits : heartbeat every 25 s when idle; unregisters client
      on GeneratorExit.

  - path: aot/aot_flask/templates/layout.html
    change: >
      Added SSE consumer script block before </body>, wrapped in Jinja
      {% if current_user.is_authenticated %}. Opens EventSource to /api/alerts/stream,
      listens for anomaly_alert events, calls window.showToast (or toastr fallback) with
      correct severity type. Reconnects with exponential backoff capped at 30 s on error.

send_webui_toast_implementation_summary: >
  Removed TODO stub. Imports sse_manager lazily (avoids circular import at module load),
  calls broadcast with {message, level, duration, timestamp(UTC ISO-8601 Z)} payload.
  Returns {status: ok} on success or {status: error, reason: ...} on exception.

frontend_changes:
  file: aot/aot_flask/templates/layout.html
  approach: EventSource (SSE, no extra packages)
  event_name: anomaly_alert
  toast_function: window.showToast (with toastr direct fallback)
  reconnect: exponential backoff 1 s → 2 s → 4 s … 30 s max
  guarded_by: current_user.is_authenticated (Jinja conditional)
