task_id: fix_search_devices_geoshape
status: COMPLETED
timestamp: "2026-03-28"
agent: claude-sonnet-4-6

summary: >
  search_devices() in aot_data_tool_service.py already contained a GeoShape
  search block (v26.10) but it only read names from meta_json.properties.
  GeoJSON features store the canonical name in feature.properties.name (GeoJSON
  standard). When a zone named "1포장" stores its name in the feature column
  rather than meta_json, the lookup returned empty. The fix adds feature.properties
  inspection as the primary name source, with meta_json as fallback.

root_cause: >
  GeoShape name lookup read only item.meta_json.properties.name.
  GeoJSON standard stores name in item.feature.properties.name.
  Query "1포장" matched a zone whose name existed only in feature.properties,
  causing search to return {"results": [], "count": 0}.

geoshape_name_field: "feature.properties.name (primary), feat_props.label, meta_json.properties.name, meta_json.properties.label, geo_id (fallback)"

changes:
  - file: aot/ai/services/aot_data_tool_service.py
    line_range: "347-361"
    description: >
      Replaced single-source meta_json name lookup with dual-source lookup:
      feature.properties first (GeoJSON standard), meta_json.properties second.
      Added comment tag v26.11. No structural change to result dict.
    lines_modified: 4
    patch_type: surgical

